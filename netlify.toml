[build]
  functions = "netlify/functions"
  publish   = "."

# Functions must be excluded from the catch-all redirect
# This order matters — Netlify processes redirects top to bottom
[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200